<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaDARK ACODE Edition + Favs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #5865f2;
            --text: #c9d1d9;
            --border: #30363d;
            --danger: #f85149;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); user-select: none; }

        header {
            background: rgba(13, 17, 23, 0.95);
            padding: 12px 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }
        .logo { font-weight: 800; color: var(--accent); font-size: 1.2rem; cursor: pointer; }
        .search-input {
            flex: 1;
            background: #010409;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            color: #fff;
            outline: none;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .manga-card {
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .manga-card img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .manga-title { padding: 8px; font-size: 0.8rem; font-weight: 600; text-align: center; height: 45px; overflow: hidden; }

        .view { display: none; }
        .view.active { display: block; }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: 700;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .btn-fav { background: #21262d; border: 1px solid var(--border); margin-top: -10px; margin-bottom: 20px; }
        .btn-fav.active { color: var(--danger); border-color: var(--danger); }

        .chapter-list { margin-top: 10px; }
        .chapter-item {
            background: var(--card);
            padding: 14px;
            margin-bottom: 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .reader-content { background: #000; min-height: 100vh; text-align: center; }
        .reader-content img { width: 100%; max-width: 800px; display: block; margin: 0 auto; }
        
        /* Sidebar Избранное */
        .sidebar {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100%;
            background: var(--card); z-index: 2000; transition: 0.3s; padding: 20px;
            border-left: 1px solid var(--border); overflow-y: auto;
        }
        .sidebar.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500; display: none; }
        .overlay.active { display: block; }
        .fav-item { display: flex; gap: 10px; margin-bottom: 15px; cursor: pointer; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .fav-item img { width: 45px; height: 60px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">MangaDARK</div>
    <input type="text" class="search-input" id="searchInput" placeholder="Search..." oninput="doSearch(this.value)">
    <div onclick="toggleSidebar(true)" style="cursor:pointer; font-size: 1.4rem;">❤️</div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar(false)"></div>
<div class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h3>Favorites</h3>
        <span onclick="toggleSidebar(false)" style="cursor:pointer;">✕</span>
    </div>
    <div id="favList"></div>
</div>

<main class="container">
    <div id="homeView" class="view active">
        <div class="manga-grid" id="mangaGrid">Loading trending...</div>
    </div>

    <div id="detailsView" class="view">
        <button class="btn" onclick="switchView('homeView')" style="background:#21262d">← Back</button>
        <h2 id="mangaName" style="margin-bottom:15px; color:#fff;"></h2>
        <button class="btn btn-fav" id="favToggleBtn">Add to Favorites ❤️</button>
        <div id="chapterList" class="chapter-list"></div>
    </div>

    <div id="readerView" class="view" style="padding:0;">
        <button class="btn" onclick="switchView('detailsView')" style="border-radius:0; margin:0; background:#21262d;">← Close Reader</button>
        <div id="readerPages" class="reader-content"></div>
        <button id="nextBtn" class="btn" style="border-radius:0; margin:0;">Next Chapter →</button>
    </div>
</main>

<script>
    const API = "https://api.mangadex.org";
    const IMG = "https://uploads.mangadex.org";
    let chapters = [];
    let searchTimer;
    let favorites = JSON.parse(localStorage.getItem('acode_manga_favs')) || [];

    window.onload = () => loadList(`${API}/manga?limit=24&includes[]=cover_art&contentRating[]=safe&order[followedCount]=desc`);

    async function loadList(url) {
        const grid = document.getElementById('mangaGrid');
        try {
            const res = await fetch(url);
            const data = await res.json();
            grid.innerHTML = data.data.map(m => {
                const title = m.attributes.title.en || Object.values(m.attributes.title)[0] || "No title";
                const cover = m.relationships.find(r => r.type === 'cover_art')?.attributes?.fileName;
                const urlCover = cover ? `${IMG}/covers/${m.id}/${cover}.256.jpg` : '';
                return `
                    <div class="manga-card" onclick="openManga('${m.id}', '${title.replace(/'/g, "\\'")}', '${urlCover}')">
                        <img src="${urlCover}" loading="lazy">
                        <div class="manga-title">${title}</div>
                    </div>`;
            }).join('');
        } catch (e) { grid.innerHTML = "Error loading. Check internet/VPN."; }
    }

    async function openManga(id, title, img) {
        switchView('detailsView');
        document.getElementById('mangaName').innerText = title;
        const list = document.getElementById('chapterList');
        list.innerHTML = "Loading chapters...";

        // Логика кнопки избранного
        const favBtn = document.getElementById('favToggleBtn');
        const isFav = favorites.some(f => f.id === id);
        favBtn.innerText = isFav ? "Remove from Favorites" : "Add to Favorites ❤️";
        favBtn.className = isFav ? "btn btn-fav active" : "btn btn-fav";
        
        favBtn.onclick = () => {
            if (favorites.some(f => f.id === id)) {
                favorites = favorites.filter(f => f.id !== id);
            } else {
                favorites.push({id, title, img});
            }
            localStorage.setItem('acode_manga_favs', JSON.stringify(favorites));
            openManga(id, title, img); // Обновить состояние кнопки
        };

        try {
            const res = await fetch(`${API}/manga/${id}/feed?translatedLanguage[]=en&order[chapter]=asc&limit=500&contentRating[]=safe&contentRating[]=suggestive`);
            const data = await res.json();
            const seen = new Set();
            chapters = data.data.filter(ch => {
                let n = ch.attributes.chapter;
                if(!n || seen.has(n)) return false;
                seen.add(n); return true;
            });

            list.innerHTML = chapters.map((ch, i) => `
                <div class="chapter-item" onclick="openReader(${i})">
                    <span>Chapter ${ch.attributes.chapter}</span>
                    <span style="color:var(--accent); font-weight:bold;">READ</span>
                </div>
            `).join('') || "No chapters.";
        } catch (e) { list.innerHTML = "Error loading chapters."; }
    }

    async function openReader(idx) {
        switchView('readerView');
        const box = document.getElementById('readerPages');
        box.innerHTML = "<p style='padding:40px;'>Loading pages...</p>";
        window.scrollTo(0, 0);

        try {
            const res = await fetch(`${API}/at-home/server/${chapters[idx].id}`);
            const data = await res.json();
            const hash = data.chapter.hash;
            const files = data.chapter.data;

            if(!files || files.length === 0) {
                box.innerHTML = "<p style='padding:20px;'>External chapter (empty).</p>";
                return;
            }

            box.innerHTML = files.map(f => `<img src="${data.baseUrl}/data/${hash}/${f}" onerror="this.src='${data.baseUrl}/data-saver/${hash}/${f}'">`).join('');

            const nBtn = document.getElementById('nextBtn');
            if(idx < chapters.length - 1) {
                nBtn.style.display = 'block';
                nBtn.onclick = () => openReader(idx + 1);
            } else { nBtn.style.display = 'none'; }
        } catch (e) { box.innerHTML = "Failed to load pages."; }
    }

    function toggleSidebar(show) {
        document.getElementById('sidebar').classList.toggle('open', show);
        document.getElementById('overlay').classList.toggle('active', show);
        if(show) {
            document.getElementById('favList').innerHTML = favorites.map(f => `
                <div class="fav-item" onclick="openManga('${f.id}', '${f.title.replace(/'/g, "\\'")}', '${f.img}'); toggleSidebar(false);">
                    <img src="${f.img}">
                    <div style="font-size:0.8rem; font-weight:600;">${f.title}</div>
                </div>
            `).join('') || "Your list is empty.";
        }
    }

    function doSearch(q) {
        clearTimeout(searchTimer);
        if(q.length < 3) return;
        searchTimer = setTimeout(() => {
            switchView('homeView');
            loadList(`${API}/manga?title=${encodeURIComponent(q)}&limit=24&includes[]=cover_art&contentRating[]=safe`);
        }, 600);
    }

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
