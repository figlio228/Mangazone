<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaReader Dark PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1014;
            --bg-card: #1a1c23;
            --accent: #818cf8;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border: #2d3139;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); line-height: 1.5; }

        header {
            background: rgba(15, 16, 20, 0.95); backdrop-filter: blur(10px);
            padding: 12px 16px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
        }
        .logo { font-weight: 700; color: var(--accent); font-size: 1.2rem; cursor: pointer; }
        .search-container { flex: 1; }
        .search-input {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border);
            padding: 10px 14px; border-radius: 10px; color: #fff; outline: none;
        }
        .icon-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #fff; }

        .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
        .manga-card {
            background: var(--bg-card); border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border); cursor: pointer; transition: 0.2s;
        }
        .manga-card img { width: 100%; height: 200px; object-fit: cover; display: block; background: #222; }
        .manga-info { padding: 10px; font-size: 0.85rem; text-align: center; font-weight: 600; }

        .view { display: none; }
        .view.active { display: block; }

        .chapter-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .chapter-item {
            background: var(--bg-card); padding: 14px; border-radius: 10px;
            border: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between;
        }
        .chapter-item:active { background: #2d3139; }
        .chapter-lang { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; }

        .reader-pages img { width: 100%; max-width: 900px; display: block; margin: 0 auto 4px; background: #111; }
        
        .btn {
            background: var(--accent); color: #fff; border: none; padding: 12px;
            border-radius: 10px; font-weight: 600; width: 100%; cursor: pointer; margin-bottom: 10px;
        }
        
        .fav-sidebar {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100%;
            background: var(--bg-card); z-index: 2000; transition: 0.3s; padding: 20px;
            border-left: 1px solid var(--border); overflow-y: auto;
        }
        .fav-sidebar.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500; display: none; }
        .overlay.active { display: block; }
        
        .error-msg { text-align: center; padding: 40px; color: var(--danger); }

        @media (max-width: 480px) { .manga-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">Manga<span>DARK</span></div>
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Search..." oninput="searchManga(this.value)">
    </div>
    <button class="icon-btn" onclick="toggleFavs(true)">❤️</button>
</header>

<div class="overlay" id="overlay" onclick="toggleFavs(false)"></div>
<div class="fav-sidebar" id="favSidebar">
    <h3 style="margin-bottom:20px;">Favorites</h3>
    <div id="favList"></div>
</div>

<main class="container">
    <div id="homeView" class="view active">
        <div class="manga-grid" id="mangaGrid"></div>
    </div>

    <div id="detailsView" class="view">
        <button class="btn" onclick="switchView('homeView')" style="background:#334155;">← Back</button>
        <h2 id="mangaTitle" style="margin-bottom:15px;"></h2>
        <button class="btn" id="favToggleBtn" style="background:#2d3139;">Add Favorite</button>
        <div class="chapter-list" id="chapterList"></div>
    </div>

    <div id="readerView" class="view">
        <button class="btn" onclick="switchView('detailsView')" style="background:#334155; position:sticky; top:70px; z-index:10;">← Back to Chapters</button>
        <div class="reader-pages" id="readerPages"></div>
        <button id="nextBtn" class="btn" style="margin-top:20px; display:none;">Next Chapter →</button>
    </div>
</main>

<script>
    const API = "https://api.mangadex.org";
    const IMG = "https://uploads.mangadex.org";
    let favs = JSON.parse(localStorage.getItem('m_favs_dark')) || [];
    let chapters = [];

    window.onload = loadHome;

    async function loadHome() {
        try {
            const res = await fetch(`${API}/manga?limit=24&includes[]=cover_art&contentRating[]=safe&order[followedCount]=desc`);
            const data = await res.json();
            renderGrid(data.data);
        } catch (e) { console.error(e); }
    }

    function renderGrid(list) {
        const grid = document.getElementById('mangaGrid');
        grid.innerHTML = list.map(m => {
            const title = m.attributes.title.en || Object.values(m.attributes.title)[0];
            const cover = m.relationships.find(r => r.type === 'cover_art')?.attributes?.fileName;
            const thumb = cover ? `${IMG}/covers/${m.id}/${cover}.256.jpg` : '';
            return `
                <div class="manga-card" onclick="showDetails('${m.id}', '${title.replace(/'/g, "")}', '${thumb}')">
                    <img src="${thumb}" loading="lazy">
                    <div class="manga-info">${title}</div>
                </div>`;
        }).join('');
    }

    async function showDetails(id, title, img) {
        switchView('detailsView');
        document.getElementById('mangaTitle').innerText = title;
        const listDiv = document.getElementById('chapterList');
        listDiv.innerHTML = 'Loading chapters...';

        updateFavBtn(id, title, img);

        try {
            // Запрашиваем больше глав, чтобы была выборка для фильтрации
            const res = await fetch(`${API}/manga/${id}/feed?translatedLanguage[]=en&order[chapter]=asc&limit=500&contentRating[]=safe&contentRating[]=suggestive`);
            const data = await res.json();
            
            // ИСПРАВЛЕНИЕ ДУБЛИКАТОВ
            const uniqueChapters = new Map();
            data.data.forEach(ch => {
                const num = ch.attributes.chapter;
                // Если номера нет или он уже есть в списке — пропускаем (оставляем первую найденную версию)
                if (num && !uniqueChapters.has(num)) {
                    uniqueChapters.set(num, ch);
                }
            });

            chapters = Array.from(uniqueChapters.values());

            listDiv.innerHTML = chapters.map((ch, i) => `
                <div class="chapter-item" onclick="openReader(${i})">
                    <span>Chapter ${ch.attributes.chapter}</span>
                    <span class="chapter-lang">EN</span>
                </div>
            `).join('') || 'No chapters found.';
        } catch (e) { listDiv.innerHTML = 'Error loading chapters.'; }
    }

    async function openReader(index) {
        switchView('readerView');
        const box = document.getElementById('readerPages');
        box.innerHTML = '<p style="text-align:center; padding:20px;">Loading pages...</p>';
        window.scrollTo(0, 0);

        try {
            const res = await fetch(`${API}/at-home/server/${chapters[index].id}`);
            const data = await res.json();
            const hash = data.chapter.hash;
            const pages = data.chapter.data;

            // ИСПРАВЛЕНИЕ ПУСТЫХ СТРАНИЦ
            if (!pages || pages.length === 0) {
                box.innerHTML = `<div class="error-msg">
                    <p>This chapter has no accessible images on MangaDex.</p>
                    <p style="font-size:0.8rem; color:gray;">(It might be an external link)</p>
                </div>`;
                return;
            }

            box.innerHTML = pages.map(img => `<img src="${data.baseUrl}/data/${hash}/${img}" loading="lazy">`).join('');

            const next = document.getElementById('nextBtn');
            if (index < chapters.length - 1) {
                next.style.display = 'block';
                next.onclick = () => openReader(index + 1);
            } else {
                next.style.display = 'none';
            }
        } catch (e) { box.innerHTML = '<p class="error-msg">Error loading images.</p>'; }
    }

    function updateFavBtn(id, title, img) {
        const btn = document.getElementById('favToggleBtn');
        const isFav = favs.some(f => f.id === id);
        btn.innerText = isFav ? 'In Favorites ❤️' : 'Add Favorite';
        btn.style.color = isFav ? 'var(--accent)' : '#fff';
        btn.onclick = () => {
            if (isFav) favs = favs.filter(f => f.id !== id);
            else favs.push({id, title, img});
            localStorage.setItem('m_favs_dark', JSON.stringify(favs));
            updateFavBtn(id, title, img);
        };
    }

    function toggleFavs(show) {
        document.getElementById('favSidebar').classList.toggle('open', show);
        document.getElementById('overlay').classList.toggle('active', show);
        if(show) {
            document.getElementById('favList').innerHTML = favs.map(f => `
                <div style="display:flex; gap:10px; margin-bottom:15px; cursor:pointer;" onclick="showDetails('${f.id}','${f.title}','${f.img}'); toggleFavs(false);">
                    <img src="${f.img}" style="width:40px; height:55px; object-fit:cover; border-radius:4px;">
                    <div style="font-size:0.8rem;">${f.title}</div>
                </div>
            `).join('') || 'Empty';
        }
    }

    let timer;
    function searchManga(q) {
        clearTimeout(timer);
        if (q.length < 3) return;
        timer = setTimeout(async () => {
            switchView('homeView');
            const res = await fetch(`${API}/manga?title=${q}&limit=20&includes[]=cover_art`);
            const data = await res.json();
            renderGrid(data.data);
        }, 600);
    }

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
